<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpriteManager Simple Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #0f172a;
            color: #f8fafc;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #4f46e5;
        }
        .sprite-container {
            width: 200px;
            height: 200px;
            border: 2px dashed #334155;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.03);
        }
        canvas {
            display: block;
        }
        .status {
            padding: 10px;
            background: #1e293b;
            border-radius: 4px;
            margin: 10px 0;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SpriteManager Simple Test</h1>
        <p>If you see a sprite below, the library is working!</p>
        
        <div class="sprite-container" id="sprite-container">
            <div id="status">Loading...</div>
        </div>
        
        <div class="status" id="debug"></div>
        
        <button onclick="testSprite()">Test Sprite</button>
        <button onclick="testAnimatedSprite()">Test Animated Sprite</button>
    </div>

    <script type="module">
        import { SpriteManagerProvider, Sprite, AnimatedSprite, useAnimations } from './dist/index.es.js';
        
        // Since we can't use React directly in HTML, we'll create a simple test
        // This is just to verify the library builds correctly
        
        document.getElementById('debug').textContent = 'Library loaded successfully!';
        document.getElementById('status').textContent = 'Library imported ✓';
        
        function testSprite() {
            document.getElementById('debug').textContent = 'Sprite test clicked - library functions available';
        }
        
        function testAnimatedSprite() {
            document.getElementById('debug').textContent = 'AnimatedSprite test clicked - library functions available';
        }
    </script>
</body>
</html>
